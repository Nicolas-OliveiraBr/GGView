<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="style.css" rel="stylesheet">
    <title>Cadastro</title>
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary">
   <main class="w-100 m-auto form-container" style="max-width: 350px;"> 
    <div class="container mt-5">
        <div class="modal" id="myModal" style="display: block;">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                            <h1 class="modal-title h3 mb-3 fw-normal text-center">Faça seu cadastro</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nome de Usuário</label>
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="floatingUsername" placeholder="Seu nome de usuário">
                                    <label for="floatingUsername">Seu nome de usuário</label>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">E-mail</label>
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="floatingEmail" placeholder="nome@exemplo.com">
                                    <label for="floatingEmail">seu@email.com</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Senha</label>
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="floatingPassword" placeholder="Sua senha">
                                    <label for="floatingPassword">mínimo 6 caracteres</label>
                                </div>
                            </div>

                             <div class="mb-3">
                                <label class="form-label fw-bold">Data de Nascimento</label>
                                <div class="form-floating">
                                    <input type="date" class="form-control" id="floatingBirthday">
                                    <label for="floatingBirthday">Selecione sua data de nascimento</label>
                                </div>
                            </div>

                           <p class="text-center mt-3">
                           <a href="index.html">Faça login</a> </p>

                            <button class="btn btn-lg btn-primary py-2 w-100" type="submit">Registra-se</button>

                            <p class="text-body-secondary mt-5 mb-3 text-center">@GGView</p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </main>
</body>

</html>
